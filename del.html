<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⌨ Typing Speed Test</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #80c7eb, #1363cc, #51eaea);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* Container */
        .container {
            background: white;
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Time Selection */
        .time-selection {
            margin-bottom: 10px;
        }

        #time-select {
            padding: 5px;
            font-size: 16px;
        }

        #start-test {
            background: #28a745;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #start-test:hover {
            background: #218838;
        }

        /* Typing Text */
        #text-container {
            font-size: 18px;
            background: #f8f8f8;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        /* Typing Area */
        #typing-area {
            width: 100%;
            height: 100px;
            font-size: 18px;
            padding: 10px;
            border: 2px solid #007bff;
            border-radius: 5px;
        }

        /* Stats */
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin-top: 10px;
        }

        /* Restart Button */
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                width: 95%;
            }
        }
        .score-card {
    display: none;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
    padding: 20px;
    margin-top: 20px;
    text-align: center;
}

.score-card h2 {
    color: #007bff;
}

.score-card p {
    font-size: 18px;
    margin: 5px 0;
    color: #333;
}

    </style>
</head>

<body>

    <!-- Container -->
    <div class="container">
        <h1>⌨ Typing Speed Test 🏆</h1>

        <!-- Time Selection -->
        <div class="time-selection">
            <label for="time-select">Select Time:</label>
            <select id="time-select">
                <option value="30">30 sec</option>
                <option value="60" selected>60 sec</option>
                <option value="90">90 sec</option>
            </select>
            <button id="start-test">🚀 Start Test</button>
        </div>

        <!-- Text Display -->
        <div id="text-container">
            <p id="text-to-type"></p>
        </div>

        <!-- Typing Area -->
        <textarea id="typing-area" placeholder="Start typing here..." disabled></textarea>

        <!-- Stats -->
        <div class="stats">
            <p>⏱ Time: <span id="timer">60</span> sec</p>
            <p>💨 WPM: <span id="wpm">0</span></p>
            <p>🎯 Accuracy: <span id="accuracy">100</span>%</p>
        </div>

        <div id="score-card" class="score-card"></div>
        <!-- Restart Button -->
        <button id="restart">🔄 Restart</button>
    </div>

 <script>
 const typingTexts = [
            "The quick brown fox jumps over the lazy dog.",
            "Typing is a skill that requires constant practice.",
            "Speed and accuracy are key to fast typing.",
            "A good typist can type without looking at the keyboard.",
            "Challenge yourself to type faster every day.",
            "Consistency in practice leads to improved typing speed.",
            "Keep your hands steady and focus on accuracy.",
            "The best way to improve typing is daily practice.",
            "Typing fast helps in increasing productivity.",
            "Keyboard shortcuts save time and effort.", "Life is a journey, not a destination.", "The sun sets in the west.", "Happiness is found in the little things.", "Knowledge is power.", "Dream big and dare to fail.", "Every day is a new beginning.", "The only limit is your mind.", "Believe in yourself and all that you are.", "Change is the only constant in life.", "Kindness is free, sprinkle it everywhere.", "Success is not the key to happiness.", "You are never too old to set another goal.", "The best way to predict the future is to create it.", "In the end, we only regret the chances we didn't take.", "Your vibe attracts your tribe.", "The only way to do great work is to love what you do.", "Mistakes are proof that you are trying.", "Life is 10% what happens to us and 90% how we react to it.", "Stay positive, work hard, make it happen.", "The journey of a thousand miles begins with one step.", "What lies behind us and what lies before us are tiny matters compared to what lies within us."
        ];

const textDisplay = document.getElementById("text-to-type");
const typingArea = document.getElementById("typing-area");
const timerDisplay = document.getElementById("timer");
const wpmDisplay = document.getElementById("wpm");
const accuracyDisplay = document.getElementById("accuracy");
const restartBtn = document.getElementById("restart");
const startTestBtn = document.getElementById("start-test");
const timeSelect = document.getElementById("time-select");
const scoreCard = document.getElementById("score-card");

let currentText = "";
let timeLeft = 60;
let timer;
let isTyping = false;
let correctChars = 0;
let totalChars = 0;
let startTime;

// **Start Typing Test**
function startTypingTest() {
    typingArea.value = "";
    timeLeft = parseInt(timeSelect.value);
    timerDisplay.innerText = timeLeft;
    wpmDisplay.innerText = "0";
    accuracyDisplay.innerText = "100";
    isTyping = false;
    correctChars = 0;
    totalChars = 0;
    startTime = null;
    clearInterval(timer);
    typingArea.disabled = false;
    typingArea.focus();
    scoreCard.style.display = "none"; // Hide score card

    showNextLine();
}

// **Start Timer**
function startTimer() {
    if (!isTyping) {
        isTyping = true;
        startTime = Date.now();
        timer = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
            } else {
                clearInterval(timer);
                typingArea.disabled = true;
                showScoreCard(); // Show score when time is up
            }
        }, 1000);
    }
}

// **Show Next Line Randomly**
function showNextLine() {
    let randomIndex = Math.floor(Math.random() * typingTexts.length);
    currentText = typingTexts[randomIndex];
    textDisplay.innerText = currentText;
    typingArea.value = "";
}

// **Typing Logic**
typingArea.addEventListener("input", () => {
    startTimer();
    
    let typedText = typingArea.value;
    totalChars = typedText.length;
    correctChars = 0;

    for (let i = 0; i < typedText.length; i++) {
        if (typedText[i] === currentText[i]) {
            correctChars++;
        }
    }

    // **Check if the user completed the current line correctly**
    if (typedText === currentText) {
        showNextLine(); // Show new line after correct typing
    }

    let elapsedTime = (parseInt(timeSelect.value) - timeLeft) / 60;
    let wpm = Math.round((correctChars / 5) / elapsedTime);
    let accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;

    wpmDisplay.innerText = isNaN(wpm) ? 0 : wpm;
    accuracyDisplay.innerText = isNaN(accuracy) ? 100 : accuracy;
});

// **Show Final Score Card**
function showScoreCard() {
    let wordsTyped = typingArea.value.trim().split(" ").length;
    let finalWPM = Math.round((wordsTyped / parseInt(timeSelect.value)) * 60);
    let accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;

    // Display score card with final results
    scoreCard.innerHTML = `
        <h2>🎯 Typing Test Completed!</h2>
        <p><strong>Words Per Minute (WPM):</strong> ${finalWPM}</p>
        <p><strong>Accuracy:</strong> ${accuracy}%</p>
        <p><strong>Total Words Typed:</strong> ${wordsTyped}</p>
        <p><strong>Time Taken:</strong> ${parseInt(timeSelect.value) - timeLeft} seconds</p>
    `;
    scoreCard.style.display = "block";
}

// **Restart Test**
restartBtn.addEventListener("click", () => {
    startTypingTest();
});

// **Start Test Button**
startTestBtn.addEventListener("click", () => {
    startTypingTest();
});

// **Initialize Test**
startTypingTest();

 </script>

</body>

</html>
